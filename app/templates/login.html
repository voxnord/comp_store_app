<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в систему</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <style>
        body {
            background-color: #F0F4F8;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-box, .welcome-box {
            background-color: #D9E2EC !important; 
            border-radius: 8px;
            padding: 40px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .login-box h2, .welcome-header h1 {
            color: #243B53;
            font-weight: 700;
            margin-bottom: 35px;
            font: soze
        }

        .login-box .form-label {
            color: #243B53 !important;
            font-weight: 700;
            margin-left: 3px;
        }

        .login-box .form-label i {
            margin-right: 5px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .login-box .form-control {
            background-color: #ffffff !important;
            border: 1px solid #8CA0B5 !important;
            color: #000000 !important;
        }

        .btn-primary, .btn-login {
            background-color: #48BB78 !important;
            border: none !important;
            color: #fff !important;
            padding: 12px;
            font-weight: 600;
        }

        .btn-primary, .btn-login {
            background-color: #48BB78 !important; 
            border: none !important;
            color: #fff !important;
            padding: 12px;
            font-weight: 600;
        }

        .brand-link {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;

            color: #243B53 !important;
            font-weight: 700;
            text-decoration: none;
        }
        
        .brand-link i {
            font-size: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <a href="{{ url_for('main.index') }}" class="brand-link">
                <i class="fas fa-laptop"></i> Компьютерный магазин
            </a>
            <p class="mt-2 text-muted">Система управления складом и продажами</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="flash-messages">
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <div class="login-box">
            <h2><i class="fas fa-sign-in-alt"></i> Вход в систему</h2>
            
            <form method="POST" action="{{ url_for('main.login') }}">
                <div class="mb-3">
                    <label for="username" class="form-label">
                        <i class="fas fa-user"></i> Имя пользователя
                    </label>
                    <input type="text" 
                           class="form-control" 
                           id="username" 
                           name="username" 
                           placeholder="Введите логин"
                           autocomplete="username"
                           required>
                </div>
                
                <div class="mb-3">
                    <label for="password" class="form-label">
                        <i class="fas fa-lock"></i> Пароль
                    </label>
                    <input type="password" 
                           class="form-control" 
                           id="password" 
                           name="password" 
                           placeholder="Введите пароль"
                           autocomplete="current-password"
                           required>
                </div>
                
                <button type="submit" class="btn btn-primary w-100">
                    <i class="fas fa-sign-in-alt"></i> Войти в систему
                </button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
