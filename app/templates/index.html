<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Компьютерный магазин</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <style>
        body {
            background-color: #F0F4F8;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .welcome-container {
            width: 100%;
            max-width: 700px;
        }

        .welcome-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .welcome-icon {
            font-size: 72px;
            color: #48BB78;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .welcome-header h1 {
            color: #243B53;
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .welcome-header p {
            color: #adadb8;
            font-size: 16px;
            margin: 0;
        }

        .welcome-box {
            background-color: #D9E2EC !important; 
            border: 1px solid #8CA0B5 !important;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 32px;
        }

        .feature-card {
            background-color: #ffffff;
            border: 1px solid #c7c7c7;
            border-radius: 6px;
            padding: 20px;
            transition: all 0.3s ease;
            cursor: default;
        }

        .feature-card:hover {
            border-color: #c5d9c8;
            background-color: #daf0de;
            transform: translateY(-4px);
            box-shadow: 0 4px 12px #c5d9c8;
        }

        .feature-icon {
            font-size: 32px;
            color: #48BB78;
            margin-bottom: 12px;
        }

        .feature-title {
            color: #243B53;
            font-size: 15px;
            font-weight: 600;
            margin: 0;
        }

        .btn-login {
            background-color: #48BB78 !important;
            border: none !important;
            color: #fff !important;
            font-weight: 600;
            padding: 16px 48px;
            border-radius: 6px;
            font-size: 16px;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-login:hover {
            background-color: #358754 !important;
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(53, 135, 84, 0.4);
        }

        .btn-login i {
            margin-right: 8px;
        }

        @media (max-width: 576px) {
            .feature-grid {
                grid-template-columns: 1fr;
            }

            .welcome-header h1 {
                font-size: 28px;
            }

            .welcome-icon {
                font-size: 56px;
            }

            .welcome-box {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="welcome-container">
        <div class="welcome-header">
            <div class="welcome-icon">
                <i class="fas fa-laptop"></i>
            </div>
            <h1>💻 Компьютерный магазин</h1>
            <p>Система управления складом и продажами</p>
        </div>

        <div class="welcome-box">
            <div class="feature-grid">
                <div class="feature-card">
                    <div class="feature-icon">
                        <i class="fas fa-boxes"></i>
                    </div>
                    <p class="feature-title">Учет товаров</p>
                </div>

                <div class="feature-card">
                    <div class="feature-icon">
                        <i class="fas fa-shopping-cart"></i>
                    </div>
                    <p class="feature-title">Продажи</p>
                </div>

                <div class="feature-card">
                    <div class="feature-icon">
                        <i class="fas fa-users"></i>
                    </div>
                    <p class="feature-title">Клиенты</p>
                </div>

                <div class="feature-card">
                    <div class="feature-icon">
                        <i class="fas fa-chart-line"></i>
                    </div>
                    <p class="feature-title">Отчеты</p>
                </div>
            </div>

            <a href="{{ url_for('main.login') }}" class="btn-login">
                <i class="fas fa-sign-in-alt"></i> Войти в систему
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
