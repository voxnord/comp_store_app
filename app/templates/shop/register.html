{% extends "shop_base.html" %}

{% block title %}Регистрация{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center align-items-center" style="min-height: 85vh;">
        <div class="col-md-6 col-lg-5">
            <div class="register-card p-4 shadow-sm rounded border">
                <div class="register-header text-center mb-4 ">
                    <div class="register-icon mb-3" style="font-size: 3rem; color: #48BB78;">
                        <i class="fas fa-user-plus"></i>
                    </div>
                    <h2 class="mb-1">Регистрация покупателя</h2>
                    <p class="text-muted">Создайте аккаунт для покупок</p>
                </div>

                <form method="post">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">
                                <i class="fas fa-user-tag me-2"></i>Фамилия
                            </label>
                            <input type="text" name="last_name" class="form-control" 
                                placeholder="Иванов" required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">
                                <i class="fas fa-user me-2"></i>Имя
                            </label>
                            <input type="text" name="first_name" class="form-control" 
                                placeholder="Иван" required autofocus>
                        </div>
                    
                        <div class="mb-3">
                            <label class="form-label">
                                <i class="fas fa-phone me-2"></i>Телефон
                            </label>
                            <input type="text" name="phone" class="form-control" 
                                   placeholder="+7 (900) 123-45-67">
                        </div>

                        <div class="col-12 mb-3">
                            <label class="form-label">
                                <i class="fas fa-map-marker-alt me-2"></i>Адрес доставки
                            </label>
                            <input type="text" name="address" class="form-control" 
                                placeholder="г. Москва, ул. Ленина, д. 1, кв. 10">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            <i class="fas fa-envelope me-2"></i>Email
                        </label>
                        <input type="email" name="email" class="form-control" 
                               placeholder="example@mail.ru">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            <i class="fas fa-at me-2"></i>Логин
                        </label>
                        <input type="text" name="username" class="form-control" 
                               placeholder="Придумайте логин" required>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">
                                <i class="fas fa-lock me-2"></i>Пароль
                            </label>
                            <input type="password" name="password" class="form-control" 
                                   placeholder="Минимум 6 символов" required minlength="6">
                        </div>

                        <div class="col-md-6 mb-4">
                            <label class="form-label">
                                <i class="fas fa-check-circle me-2"></i>Повтор пароля
                            </label>
                            <input type="password" name="password2" class="form-control" 
                                   placeholder="Повторите пароль" required minlength="6">
                        </div>
                    </div>
                    
                    <div class="mb-3 form-check">
                        <input type="checkbox" name="consent_pdn" class="form-check-input" id="consent" required>
                        <label class="form-check-label" for="consent" style="font-size: 0.85rem;">
                            Я согласен на обработку персональных данных
                        </label>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 mb-3">
                        <i class="fas fa-user-plus me-2"></i>Зарегистрироваться
                    </button>

                    <div class="text-center">
                        <p class="text-muted mb-0">
                            Уже есть аккаунт? 
                            <a href="{{ url_for('shop.login') }}" class="text-decoration-none">
                                Войдите
                            </a>
                        </p>
                    </div>
                </form>

                <div class="mt-4 text-center">
                    <a href="{{ url_for('shop.index') }}" class="btn btn-outline-secondary btn-sm">
                        <i class="fas fa-arrow-left me-2"></i>Вернуться в магазин
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    body {
        background-color: #F0F4F8;
        color: #243B53;
        font-family: 'Inter', 'Segoe UI', sans-serif;
    }
    
    .shop-navbar {
        background-color: #8CA0B5 !important;
        border-bottom: 2px solid #48BB78;
    }
    
    .product-card, .login-card, .register-card, .cart-card, .empty-cart {
        background-color: #D9E2EC !important;
        border: 1px solid rgba(0,0,0,0.05) !important;
        color: #243B53 !important;
        border-radius: 12px;
    }

    .product-title, .login-card h2, .register-card h2, h1, .cart-table th {
        color: #243B53 !important;
    }

    .product-vendor, .text-muted {
        color: #48BB78 !important;
    }

    .product-price, .cart-total-amount {
        color: #000000 !important;
        font-weight: 700;
    }

    /* Кнопки */
    .btn-success, .btn-primary, .btn-login {
        background-color: #48BB78 !important;
        border: none !important;
        color: #ffffff !important;
        font-weight: 600;
    }

    .btn-success:hover, .btn-primary:hover {
        background-color: #3ba366 !important;
    }

    .btn-outline-primary, .btn-outline-secondary {
        border-color: #8CA0B5 !important;
        color: #243B53 !important;
    }

    /* Формы */
    .form-control {
        background-color: #ffffff !important;
        border: 1px solid #8CA0B5 !important;
        color: #000000 !important;
    }

    .form-label i {
        color: #48BB78;
    }

    .cart-table {
        color: #243B53 !important;
    }
    
    .cart-table tr {
        border-bottom: 1px solid rgba(0,0,0,0.05);
    }

    /* Футер */
    footer {
        background-color: #D9E2EC !important;
        border-top: 1px solid #8CA0B5 !important;
        color: #243B53 !important;
    }
</style>

<script>
document.querySelector('form').addEventListener('submit', function(e) {
    const password = document.querySelector('input[name="password"]').value;
    const password2 = document.querySelector('input[name="password2"]').value;
    
    if (password !== password2) {
        e.preventDefault();
        alert('Пароли не совпадают!');
        return false;
    }
});
</script>
{% endblock %}
